<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상록에스</title>
    <style>
        /* 1. 부모 요소(html, body)의 높이를 반드시 100%로 설정해야 함 */
        html, body {
            margin: 0;       /* 기본 여백 제거 (흰 테두리 방지) */
            padding: 0;
            height: 100%;    /* 부모 높이가 있어야 자식(iframe)도 100% 가능 */
            overflow: hidden; /* 이중 스크롤바 방지 (body 스크롤 숨김) */
        }

        /* 2. iframe 스타일 설정 */
        iframe {
            width: 100%;
            height: 100%;
            border: none;    /* 테두리 제거 */
            display: block;  /* 하단 미세한 여백 제거 */
        }
    </style>
</head>
<body>
    
    <iframe src="https://data.srmm.kr:13277/index"></iframe>

</body>
</html>
