<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MissionFit - Smart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0b0f14; --panel:#121821; --text:#e8f0ff; --muted:#9aa4b2; --accent:#ffa726; --warn:#ff4d4d; --success:#2ecc71; }
    * { box-sizing: border-box; font-family: "Segoe UI", sans-serif, Pretendard, system-ui, -apple-system, Arial; }
    body { margin: 0; color: var(--text); background: var(--bg); }

    .smart-wrap { display:grid; grid-template-columns: 1fr 340px; gap:20px; min-height:70vh; max-height: calc(100vh - 70px); padding:20px; }
    .smart-preview { position:relative; background:#000; border-radius:16px; overflow:hidden; min-height:400px; }
    .smart-preview video { width:100%; height:100%; object-fit:cover; display:block; transform: scaleX(-1); }
    .smart-preview .preview-placeholder { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:18px; }
    .smart-panel { background:var(--panel); border-radius:16px; padding:20px; display:flex; flex-direction:column; gap:16px; }
    .smart-panel h3 { margin:0 0 8px; }
    .stage-row { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; background:rgba(255,255,255,0.05); border-radius:12px; border:1px solid rgba(255,255,255,0.08); }
    .stage-row.done { border-color:var(--success); background:rgba(46,204,113,0.15); }
    .stage-row.fail { border-color:var(--warn); background:rgba(255,77,77,0.15); }
    .stage-name { font-weight:700; }
    .stage-status { font-size:13px; color:var(--muted); }
    .stage-points { font-weight:800; font-size:18px; color:var(--accent); }
    .total-row { margin-top:8px; padding:16px; background:rgba(255,167,38,0.15); border:1px solid var(--accent); border-radius:12px; font-weight:800; font-size:20px; text-align:center; }
    .btn-start { width:100%; padding:16px; border-radius:12px; border:none; background:linear-gradient(90deg,#3b82f6,#2563eb); color:#fff; font-weight:800; font-size:18px; cursor:pointer; }
    .btn-start:hover { filter:brightness(1.1); }
    .btn-start:disabled { opacity:0.6; cursor:not-allowed; }

    /* 모달: 게임 iframe */
    .game-modal { display:none; position:fixed; inset:0; z-index:9998; background:rgba(0,0,0,0.95); flex-direction:column; }
    .game-modal.is-open { display:flex; }
    .game-modal iframe { flex:1; width:100%; border:none; }
    .game-modal .close-game { position:absolute; top:12px; right:12px; z-index:9999; width:40px; height:40px; border-radius:50%; border:none; background:rgba(255,255,255,0.2); color:#fff; font-size:24px; cursor:pointer; }

    /* 모달: 성공(finish) / 실패(fail) */
    .result-modal { display:none; position:fixed; inset:0; z-index:10000; align-items:center; justify-content:center; background:rgba(0,0,0,0.85); padding:20px; }
    .result-modal.is-open { display:flex; }
    .result-modal .result-box { max-width:550px; width:90%; text-align:center; padding:50px 40px; border-radius:40px; backdrop-filter:blur(15px); box-shadow:0 0 60px rgba(46,204,113,0.2); }
    .result-modal.fail .result-box { border:1px solid rgba(255,77,77,0.3); box-shadow:0 0 40px rgba(255,77,77,0.2); }
    .result-modal.success .result-box { border:1px solid rgba(46,204,113,0.3); }
    .result-modal .result-icon { font-size:80px; margin-bottom:16px; display:block; }
    .result-modal .result-title { font-size:42px; font-weight:900; margin:0; }
    .result-modal.success .result-title { color:var(--success); }
    .result-modal.fail .result-title { color:var(--warn); }
    .result-modal .result-msg { font-size:20px; margin:20px 0 30px; color:var(--text); opacity:0.9; }
    .result-modal .result-points { font-size:24px; font-weight:800; color:var(--accent); margin-bottom:24px; }
    .result-modal .btn-group { display:flex; flex-direction:column; gap:12px; }
    .result-modal .btn-result { display:block; padding:18px 32px; border-radius:16px; font-size:18px; font-weight:800; text-align:center; text-decoration:none; color:inherit; border:none; cursor:pointer; transition:transform 0.2s; }
    .result-modal .btn-result:hover { transform:scale(1.03); }
    .result-modal .btn-next { background:linear-gradient(135deg, var(--success), #5eead4); color:#05140d; }
    .result-modal .btn-confirm { background:linear-gradient(135deg, var(--success), #5eead4); color:#05140d; }
    .result-modal .btn-retry { background:var(--accent); color:#000; }
    .result-modal .btn-home { background:transparent; color:var(--muted); font-size:15px; }

    /* ===== Mobile Responsive ===== */
    @media (max-width: 768px){
      .smart-wrap{
        grid-template-columns: 1fr;
        padding: 12px;
        gap: 12px;
        min-height: auto;
        max-height: none;
      }
      .smart-preview{
        min-height: 220px;
        border-radius: 12px;
      }
      .smart-panel{
        padding: 14px;
        border-radius: 12px;
        gap: 12px;
      }
      .smart-panel h3{ margin-bottom: 0; }
      .stage-row{
        padding: 10px 12px;
        border-radius: 10px;
      }
      .stage-status{ font-size: 12px; }
      .stage-points{ font-size: 16px; }
      .total-row{
        font-size: 18px;
        padding: 12px;
        border-radius: 10px;
      }
      .btn-start{
        font-size: 16px;
        padding: 14px;
        border-radius: 10px;
      }

      .game-modal .close-game{
        top: 8px;
        right: 8px;
        width: 36px;
        height: 36px;
        font-size: 22px;
      }
      .result-modal{
        padding: 12px;
      }
      .result-modal .result-box{
        width: 95%;
        padding: 32px 16px;
        border-radius: 24px;
      }
      .result-modal .result-icon{
        font-size: 60px;
        margin-bottom: 12px;
      }
      .result-modal .result-title{
        font-size: 32px;
      }
      .result-modal .result-msg{
        font-size: 16px;
        margin: 14px 0 20px;
      }
      .result-modal .result-points{
        font-size: 20px;
        margin-bottom: 18px;
      }
      .result-modal .btn-result{
        padding: 14px 18px;
        font-size: 16px;
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
<section class="smart-wrap">
  <div class="smart-preview">
    <video id="previewVideo" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;"></video>
    <div id="previewPlaceholder" class="preview-placeholder">카메라를 사용하려면 시작을 누르세요</div>
  </div>
  <aside class="smart-panel">
    <h3>미션 제어</h3>
    <p style="color:var(--muted);font-size:14px;margin:0;">5단계 게임 후 단계별 포인트가 합산되어 저장됩니다.</p>
    <div id="stage1" class="stage-row"><span class="stage-name">1단계</span><span class="stage-status" id="s1-status">대기</span><span class="stage-points" id="s1-points">-</span></div>
    <div id="stage2" class="stage-row"><span class="stage-name">2단계</span><span class="stage-status" id="s2-status">대기</span><span class="stage-points" id="s2-points">-</span></div>
    <div id="stage3" class="stage-row"><span class="stage-name">3단계</span><span class="stage-status" id="s3-status">대기</span><span class="stage-points" id="s3-points">-</span></div>
    <div id="stage4" class="stage-row"><span class="stage-name">4단계</span><span class="stage-status" id="s4-status">대기</span><span class="stage-points" id="s4-points">-</span></div>
    <div id="stage5" class="stage-row"><span class="stage-name">5단계</span><span class="stage-status" id="s5-status">대기</span><span class="stage-points" id="s5-points">-</span></div>
    <div class="total-row">총 포인트: <span id="totalPoints">0</span></div>
    <button type="button" id="startBtn" class="btn-start">시작</button>
  </aside>
</section>

<!-- 게임 모달 (iframe) -->
<div id="gameModal" class="game-modal" aria-hidden="true">
  <button type="button" class="close-game" id="closeGameBtn" aria-label="닫기">&times;</button>
  <iframe id="gameFrame" title="미션 게임"></iframe>
</div>

<!-- 성공 모달 (finish.html 스타일) -->
<div id="successModal" class="result-modal success" aria-hidden="true">
  <div class="result-box">
    <span class="result-icon">🏆</span>
    <h1 class="result-title">MISSION COMPLETE</h1>
    <p class="result-msg" id="successMsg">목표를 성공적으로 달성했습니다.</p>
    <p class="result-points" id="successPoints"></p>
    <div class="btn-group">
      <button type="button" id="btnNextStage" class="btn-result btn-next">다음 단계 도전하기</button>
      <button type="button" id="btnConfirmOnly" class="btn-result btn-confirm" style="display:none;">확인</button>
      <a href="#" id="btnSuccessHome" class="btn-result btn-home">메인 화면으로 돌아가기</a>
    </div>
  </div>
</div>

<!-- 실패 모달 (fail.html 스타일) -->
<div id="failModal" class="result-modal fail" aria-hidden="true">
  <div class="result-box">
    <span class="result-icon">⚠️</span>
    <h1 class="result-title">TIME OUT</h1>
    <p class="result-msg">아쉽네요! 목표 세트를 달성하지 못했습니다.</p>
    <div class="btn-group">
      <button type="button" id="btnFailBack" class="btn-result btn-retry">메인으로 돌아가기</button>
    </div>
  </div>
</div>

<script>
(function(){
  const BASE_POINTS = [100, 100, 100, 100, 100];
  const TIME_LIMITS = [20, 20, 20, 20, 30];
  const STAGE_IDS = ['STAGE_1','STAGE_2','STAGE_3','STAGE_4','STAGE_5'];
  const RUN_BASE = '/missions/run/stage';

  const gameModal = document.getElementById('gameModal');
  const gameFrame = document.getElementById('gameFrame');
  const successModal = document.getElementById('successModal');
  const failModal = document.getElementById('failModal');
  const startBtn = document.getElementById('startBtn');
  const closeGameBtn = document.getElementById('closeGameBtn');
  const btnNextStage = document.getElementById('btnNextStage');
  const btnConfirmOnly = document.getElementById('btnConfirmOnly');
  const btnSuccessHome = document.getElementById('btnSuccessHome');
  const btnFailBack = document.getElementById('btnFailBack');
  const previewVideo = document.getElementById('previewVideo');
  const previewPlaceholder = document.getElementById('previewPlaceholder');

  let runState = { currentStage: 0, points: [0,0,0,0,0], status: ['대기','대기','대기','대기','대기'] };
  let previewStream = null;
  let autoNextTimer = null;
  let autoNextRemain = 0;

  function totalPoints() {
    return runState.points.reduce(function(a,b){ return a + b; }, 0);
  }

  function renderPanel() {
    for (var i = 0; i < 5; i++) {
      var row = document.getElementById('stage' + (i+1));
      var statusEl = document.getElementById('s' + (i+1) + '-status');
      var pointsEl = document.getElementById('s' + (i+1) + '-points');
      if (!row) continue;
      row.className = 'stage-row';
      if (runState.status[i] === '성공') { row.classList.add('done'); }
      if (runState.status[i] === '실패') { row.classList.add('fail'); }
      statusEl.textContent = runState.status[i];
      pointsEl.textContent = runState.points[i] > 0 ? runState.points[i] + 'p' : '-';
    }
    var totalEl = document.getElementById('totalPoints');
    if (totalEl) totalEl.textContent = totalPoints();
  }

  function openGame(stageNum) {
    gameFrame.src = RUN_BASE + stageNum + '.html';
    gameModal.classList.add('is-open');
    gameModal.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
    if (startBtn) startBtn.textContent = '종료';
  }

  function closeGame() {
    gameFrame.src = 'about:blank';
    gameModal.classList.remove('is-open');
    gameModal.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    if (startBtn) startBtn.textContent = '시작';
  }

  function clearAutoNext() {
    if (autoNextTimer) { clearInterval(autoNextTimer); autoNextTimer = null; }
    autoNextRemain = 0;
  }

  function showSuccess(point, stageNum, isLast) {
    closeGame();
    document.getElementById('successPoints').textContent = '+' + point + '점';
    btnNextStage.style.display = isLast ? 'none' : 'block';
    btnConfirmOnly.style.display = isLast ? 'block' : 'none';
    btnSuccessHome.style.display = isLast ? 'none' : 'block';
    successModal.classList.add('is-open');
    clearAutoNext();
    if (!isLast) {
      autoNextRemain = 3;
      document.getElementById('successMsg').textContent = '목표를 성공적으로 달성했습니다. ' + autoNextRemain + '초 후 다음 단계로 이동합니다.';
      autoNextTimer = setInterval(function() {
        autoNextRemain -= 1;
        if (autoNextRemain > 0) {
          document.getElementById('successMsg').textContent = '목표를 성공적으로 달성했습니다. ' + autoNextRemain + '초 후 다음 단계로 이동합니다.';
          return;
        }
        clearAutoNext();
        // 사용자가 이미 모달을 닫았거나 상태가 바뀐 경우 보호
        if (successModal.classList.contains('is-open')) btnNextStage.click();
      }, 1000);
    } else {
      document.getElementById('successMsg').textContent = '목표를 성공적으로 달성했습니다.';
    }
  }

  function showFail() {
    closeGame();
    failModal.classList.add('is-open');
  }

  function hideSuccess() {
    successModal.classList.remove('is-open');
    clearAutoNext();
  }

  function hideFail() {
    failModal.classList.remove('is-open');
  }

  function ensureCameraPreview() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return Promise.reject(new Error('getUserMedia not supported'));
    if (previewStream) return Promise.resolve(previewStream);
    if (previewPlaceholder) previewPlaceholder.textContent = '카메라 권한을 허용해주세요';
    return navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } }).then(function(stream) {
      previewStream = stream;
      previewVideo.srcObject = stream;
      if (previewPlaceholder) previewPlaceholder.style.display = 'none';
      return stream;
    }).catch(function(err) {
      if (previewPlaceholder) previewPlaceholder.textContent = '카메라를 사용할 수 없습니다 (권한/장치 확인)';
      throw err;
    });
  }

  window.addEventListener('message', function(e) {
    if (!e.data || e.data.type !== 'stageEnd') return;
    var d = e.data;
    var stageIndex = (d.stage || 1) - 1;
    if (stageIndex < 0 || stageIndex > 4) return;
    var isLastStage = (stageIndex === (STAGE_IDS.length - 1));

    if (d.success) {
      var limitSec = TIME_LIMITS[stageIndex];
      var elapsed = d.elapsedSec != null ? d.elapsedSec : limitSec;
      var bonus = Math.max(0, Math.floor(limitSec - elapsed)) * 5;
      var point = d.point != null ? d.point : (BASE_POINTS[stageIndex] + bonus);

      runState.points[stageIndex] = point;
      runState.status[stageIndex] = '성공';
      renderPanel();

      fetch('/api/missions/play', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          missionStage: STAGE_IDS[stageIndex],
          success: true,
          point: point
        })
      }).then(function() {
        showSuccess(point, d.stage, isLastStage);
      }).catch(function() {
        showSuccess(point, d.stage, isLastStage);
      });
    } else {
      runState.status[stageIndex] = '실패';
      runState.points[stageIndex] = 0;
      renderPanel();
      showFail();
    }
  });

  window.addEventListener('message', function(e) {
    if (!e.data || e.data.type !== 'stageExit') return;
    closeGame();
  });

  startBtn.addEventListener('click', function() {
    // 게임 진행 중이면 "종료" 동작: 모달 닫고 메인 화면으로 복귀
    if (gameModal.classList.contains('is-open')) {
      closeGame();
      return;
    }

    // 새 시도 시작
    runState = { currentStage: 0, points: [0,0,0,0,0], status: ['대기','대기','대기','대기','대기'] };
    renderPanel();
    ensureCameraPreview().catch(function(){}).finally(function() {
      openGame(1);
    });
  });

  closeGameBtn.addEventListener('click', function() {
    closeGame();
  });

  btnNextStage.addEventListener('click', function() {
    clearAutoNext();
    hideSuccess();
    var next = runState.points.findIndex(function(p) { return p === 0; });
    if (next === -1) next = 5;
    else next += 1;
    if (next <= 5) openGame(next);
  });

  btnConfirmOnly.addEventListener('click', function() {
    hideSuccess();
  });

  btnSuccessHome.addEventListener('click', function(ev) {
    ev.preventDefault();
    hideSuccess();
  });

  btnFailBack.addEventListener('click', function() {
    hideFail();
  });

  renderPanel();
  // 페이지 진입 시 카메라 프리뷰 자동 시작(권한 요청)
  ensureCameraPreview().catch(function(){});
})();
</script>
</body>
</html>
